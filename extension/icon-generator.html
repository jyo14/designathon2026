<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Wick icon generator</title>
</head>
<body>
  <canvas id="c" width="48" height="48"></canvas>
  <br />
  <a id="dl" download="icon.png">Download icon.png</a>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    // Background circle
    ctx.beginPath();
    ctx.arc(24, 24, 24, 0, Math.PI * 2);
    ctx.fillStyle = '#1B4D3E';
    ctx.fill();

    // White flame / candle shape
    ctx.beginPath();
    // Candle body
    ctx.roundRect(19, 28, 10, 12, 2);
    ctx.fillStyle = '#FFFFFF';
    ctx.fill();

    // Flame (teardrop)
    ctx.beginPath();
    ctx.moveTo(24, 10);
    ctx.bezierCurveTo(29, 15, 31, 20, 24, 26);
    ctx.bezierCurveTo(17, 20, 19, 15, 24, 10);
    ctx.fillStyle = '#FFFFFF';
    ctx.fill();

    // Wire up download
    const link = document.getElementById('dl');
    link.href = canvas.toDataURL('image/png');
  </script>
</body>
</html>
